<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptIn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- Header / Search --- */
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #007bff; }

    /* --- Main content area --- */
    .panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left nav */
    .nav-panel {
      width: 140px;
      min-width: 140px;
      border-right: 1px solid #eee;
      background: #fafafa;
      overflow-y: auto;
      padding: 8px;
    }
    .nav-item, .folder-item {
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: background-color 0.15s, font-weight 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-item:hover, .folder-item:hover { background: #f0f0f0; }
    .nav-item.active, .folder-item.active {
      background: #e3e3e3;
      font-weight: bold;
    }
    .folder-item { padding-left: 20px; font-size: 12px; }

    /* Right content */
    .content-panel {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .prompt-item {
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: background-color 0.15s;
    }
    .prompt-item:hover { background: #f0f4ff; }
    .prompt-item.focused {
      outline: 2px solid #007bff;
      background: #e6f0ff;
    }
    .group-title {
      padding: 6px 10px;
      font-weight: bold;
      font-size: 12px;
      background: #f0f0f0;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .empty-message {
      padding: 20px;
      text-align: center;
      color: #888;
      font-size: 13px;
    }

    /* Footer */
    .footer {
      padding: 8px 12px;
      border-top: 1px solid #eee;
      background: #f5f5f5;
      font-size: 11px;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    /* Hidden state */
    .hidden-state {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>PromptIn</h1>
    <input type="text" class="search-input" id="search-input" placeholder="Search prompts..." />
  </div>

  <div class="panels" id="panels">
    <div class="nav-panel" id="nav-panel"></div>
    <div class="content-panel" id="content-panel"></div>
  </div>

  <div class="hidden-state" id="idle-message" style="display: none;">
    Type <strong>/</strong> in any AI chat input to browse prompts here.
  </div>

  <div class="footer">
    <span>Click to insert</span>
    <span>Esc to close</span>
  </div>

  <script src="pages/ExtPay.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
